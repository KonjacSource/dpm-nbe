
name:                dpm-nbe
version:             0.1.0.0
github:              "KonjacSource/dpm-nbe"
license:             BSD3
author:              "Qu Zhuoyuan"
maintainer:          "quzhuoyuan@gmail.com"
copyright:           "2026 Qu Zhuoyuan"
category:            Language

description:         "Do dependent pattern matching under normalization by evaluation setup"

default-extensions:
- LambdaCase
- NoMonomorphismRestriction
- OverloadedStrings
- PatternSynonyms
- RecordWildCards
- StandaloneDeriving
- Strict
- TupleSections
- DerivingVia
- ViewPatterns
- FunctionalDependencies

ghc-options:
- -Wall
- -Wno-name-shadowing
- -Wno-missing-signatures
- -Wno-unused-do-bind
- -Wno-unused-matches

dependencies:
- base >= 4.7 && < 5
- containers
- megaparsec
- mtl
- transformers

source-dirs: ./src

executable:
  main: Main.hs
  ghc-options:
  - -O